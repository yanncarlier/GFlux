name: gflux
description: >
  GFlux: A real-time multimodal AI agent built for the Gemini Live Agent Challenge.
  Features bidirectional audio/video streaming and Google Cloud integration.
version: 1.0.0+1
publish_to: 'none' # Prevents accidental publishing to pub.dev

environment:
  sdk: '>=3.5.0 <4.0.0' # Aligned with the 2026 Dart standards

dependencies:
  flutter:
    sdk: flutter

  # --- CORE GOOGLE & AI STACK ---
  # Mandatory for the challenge: connects your app to Google Cloud/Vertex AI.
  firebase_core: ^3.2.0
  firebase_ai: any
  google_generative_ai: any
  
  # --- MULTIMODAL CAPABILITIES (Voice & Vision) ---
  # Required for the "Live Agent" category to 'see' and 'hear'.
  camera: any # For real-time video stream to Gemini
  record: any # For high-fidelity audio capture
  permission_handler: any # Essential for requesting Mic/Camera access
  
  # --- UI & STATE MANAGEMENT ---
  # Helps maintain a "Clean Agentic" architecture.
  provider: any
  flutter_ai_toolkit: any # Pre-built widgets for AI chat and streaming
  flutter_spinkit: any # For "Flow/Flux" loading animations
  
  # --- UTILITIES ---
  path_provider: ^2.1.3
  intl: ^0.19.0
  audioplayers: ^6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0 # Ensures code quality for the GitHub repo submission

flutter:
  uses-material-design: true

  # Add assets here for GFlux branding
  assets:
    - assets/images/gflux_logo.png
    - assets/animations/flux_pulse.json

# PROJECT ARCHITECTURE NOTE:
# This project follows the "Live Agent" track. 
# Backend logic is designed to be hosted on Google Cloud Run.
# Frontend uses Firebase AI Logic for native Vertex AI integration.