<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GFlux Single Interface View</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style type="text/tailwindcss">
        :root {
            --deep-purple: #7C3AED;
            --electric-violet: #A855F7;
            --deep-charcoal: #121212;
        }
        body {
            font-family: 'Space Grotesk', sans-serif;
            -webkit-font-smoothing: antialiased;
            background-color: var(--deep-charcoal);
        }
        .purple-glow-border {
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.1), inset 0 0 15px rgba(168, 85, 247, 0.05);
        }
        .waveform-glow {
            box-shadow: 0 0 12px var(--electric-violet);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7C3AED",
                        "accent-purple": "#A855F7",
                        "deep-charcoal": "#121212",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "mono": ["ui-monospace", "SFMono-Regular", "Menlo", "Monaco", "Consolas", "monospace"]
                    }
                },
            },
        }
    </script>
<style>
        body {
            min-height: 100dvh;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-slate-100 flex items-center justify-center p-0 m-0 overflow-hidden">
<div class="relative w-full max-w-[430px] h-[932px] bg-deep-charcoal flex flex-col px-6">
<div class="flex justify-between items-center pt-14 pb-4 text-xs font-medium opacity-40">
<span>9:41</span>
<div class="flex gap-1.5 items-center">
<span class="material-symbols-outlined text-[16px]">signal_cellular_alt</span>
<span class="material-symbols-outlined text-[16px]">wifi</span>
<span class="material-symbols-outlined text-[16px]">battery_full</span>
</div>
</div>
<div class="flex justify-end items-center pt-4 pb-8">
<div class="flex items-center gap-3 bg-white/5 py-2 px-4 rounded-full border border-white/5">
<span class="text-[11px] tracking-[0.15em] uppercase font-medium text-slate-400">GFlux: <span class="text-accent-purple">Listening...</span></span>
<span class="material-symbols-outlined text-accent-purple text-lg" style="font-variation-settings: 'FILL' 1">psychology</span>
</div>
</div>
<div class="flex-1 flex flex-col items-center justify-center mb-12">
<div class="w-full h-full max-h-[580px] rounded-[32px] border border-white/10 purple-glow-border bg-black/40 flex items-center justify-center relative overflow-hidden">
<div class="absolute inset-0 flex items-center justify-center opacity-20">
<div class="w-24 h-24 border border-white/10 rounded-full flex items-center justify-center">
<div class="w-12 h-12 border border-white/5 rounded-full"></div>
</div>
</div>
<div class="absolute top-6 left-6 w-2 h-2 border-t border-l border-white/20"></div>
<div class="absolute top-6 right-6 w-2 h-2 border-t border-r border-white/20"></div>
<div class="absolute bottom-6 left-6 w-2 h-2 border-b border-l border-white/20"></div>
<div class="absolute bottom-6 right-6 w-2 h-2 border-b border-r border-white/20"></div>
</div>
</div>
<div class="pb-24 flex flex-col items-center">
<div class="w-full max-w-[280px] h-0.5 bg-gradient-to-r from-transparent via-accent-purple to-transparent rounded-full waveform-glow opacity-80"></div>
<div class="w-full max-w-[200px] h-8 bg-accent-purple/5 blur-3xl -mt-4"></div>
</div>
<div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-32 h-1 bg-white/10 rounded-full"></div>
</div>

</body></html>
